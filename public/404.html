<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages cannot serve SPA routes directly. Convert
      // /prediccion_frontend/motor into /prediccion_frontend/#/motor.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      var basePath = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/';
      var routePath = l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/');
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        basePath + '#/' + routePath +
        (l.search || '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
